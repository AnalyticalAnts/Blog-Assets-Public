  <!-- Bottom fold creases -->
  <line x1="112" y1="258" x2="167" y2="212" stroke="#162030" stroke-width="1.2"/>
  <line x1="316" y1="258" x2="261" y2="212" stroke="#162030" stroke-width="1.2"/>
  <!-- mailto: label -->
  <text x="214" y="244" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="19" font-weight="700" fill="#2d4a63">mailto:</text>

  <!-- Broken indicator (circle + slash) -->
  <circle cx="214" cy="190" r="30" fill="none" stroke="#7f1d1d" stroke-width="1.5" opacity="0.5"/>
  <line x1="193" y1="169" x2="235" y2="211" stroke="#7f1d1d" stroke-width="1.5" opacity="0.5"/>

  <!-- Descriptor text -->
  <text x="214" y="281" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#334155">
    Opens Outlook. If you have it installed.
  </text>
  <text x="214" y="298" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#253040">
