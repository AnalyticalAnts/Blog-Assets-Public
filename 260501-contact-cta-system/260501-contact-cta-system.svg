  <text x="720" y="263" font-family="Arial,sans-serif" font-size="9" fill="#475569">&#9662;</text>

  <!-- Field 5: Challenge (textarea) -->
  <text x="498" y="280" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="#64748b" letter-spacing="0.8">BIGGEST CHALLENGE</text>
  <rect x="498" y="283" width="230" height="28" rx="3"
        fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="506" y="294" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#475569">Finance and Ops aren&#8217;t on the</text>
  <text x="506" y="305" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#475569">same numbers&#8230;</text>

  <!-- Submit button -->
  <rect x="498" y="323" width="230" height="22" rx="5" fill="#2563eb"/>
  <text x="613" y="338" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="10.5" font-weight="600" fill="white" letter-spacing="0.3">Send Message</text>

  <!-- Bot protection badges (inside form) -->
  <rect x="484" y="354" width="90" height="13" rx="3"
        fill="#0a2015" stroke="#16a34a" stroke-width="0.75"/>
  <text x="529" y="364" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="7.5" font-weight="600" fill="#4ade80">&#10003; Turnstile</text>

  <rect x="580" y="354" width="80" height="13" rx="3"
        fill="#1a0a0a" stroke="#b91c1c" stroke-width="0.75"/>
  <text x="620" y="364" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="7.5" font-weight="600" fill="#f87171">&#8856; Honeypot</text>

  <!-- Qualified badge (outside form) -->
  <rect x="484" y="374" width="70" height="14" rx="7"
        fill="#0c2040" stroke="#2563eb" stroke-width="0.75"/>
  <text x="519" y="384.5" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="7.5" font-weight="600" fill="#60a5fa">Qualified &#10003;</text>

  <!-- ====================== BOTTOM STRIP ====================== -->
  <rect x="0" y="398" width="860" height="32" fill="#060d1a"/>
  <line x1="0" y1="398" x2="860" y2="398" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- Tech badges -->
  <rect x="20" y="410" width="56" height="13" rx="6" fill="#0f1f3d"/>
  <text x="48" y="420" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8" fill="#93c5fd" font-weight="600">Next.js</text>

  <rect x="82" y="410" width="50" height="13" rx="6" fill="#0f1f3d"/>
  <text x="107" y="420" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8" fill="#93c5fd" font-weight="600">Resend</text>

  <rect x="138" y="410" width="103" height="13" rx="6" fill="#0f1f3d"/>
  <text x="189" y="420" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8" fill="#93c5fd" font-weight="600">Cloudflare Turnstile</text>

  <rect x="248" y="410" width="52" height="13" rx="6" fill="#0a2015"/>
  <text x="274" y="420" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8" fill="#4ade80" font-weight="600">Insights</text>

  <!-- Branding -->
  <text x="840" y="420" text-anchor="end"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" font-weight="700" fill="#334155" letter-spacing="1.2">ANALYTICAL ANTS</text>

</svg>
