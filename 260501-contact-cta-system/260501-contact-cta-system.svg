  </text>

  <!-- Unqualified badge -->
  <rect x="164" y="311" width="100" height="15" rx="7"
        fill="#1c0808" stroke="#7f1d1d" stroke-width="0.75"/>
  <text x="214" y="322.5" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="8.5" font-weight="600" fill="#f87171">Unqualified</text>

  <!-- ====================== RIGHT: AFTER ====================== -->

  <!-- Form container -->
  <rect x="484" y="107" width="258" height="260" rx="9"
        fill="#0c1929" stroke="#1e3a8a" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="484" y="107" width="258" height="30" rx="9" fill="#1e3a8a"/>
  <rect x="484" y="122" width="258" height="15" fill="#1e3a8a"/>
  <text x="613" y="127" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
