  <text x="720" y="167" font-family="Arial,sans-serif" font-size="9" fill="#475569">&#9662;</text>

  <!-- Field 2: Revenue -->
  <text x="498" y="184" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="#64748b" letter-spacing="0.8">COMPANY REVENUE</text>
  <rect x="498" y="187" width="230" height="16" rx="3"
        fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="506" y="199" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#cbd5e1">$50M &#8211; $250M</text>
  <text x="720" y="199" font-family="Arial,sans-serif" font-size="9" fill="#475569">&#9662;</text>

  <!-- Field 3: Budget -->
  <text x="498" y="216" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="#64748b" letter-spacing="0.8">PROJECT BUDGET</text>
  <rect x="498" y="219" width="230" height="16" rx="3"
        fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="506" y="231" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#cbd5e1">$25K &#8211; $100K</text>
  <text x="720" y="231" font-family="Arial,sans-serif" font-size="9" fill="#475569">&#9662;</text>

  <!-- Field 4: Intent -->
  <text x="498" y="248" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="700" fill="#64748b" letter-spacing="0.8">PROJECT INTENT</text>
  <rect x="498" y="251" width="230" height="16" rx="3"
        fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="506" y="263" font-family="'Courier New',Courier,monospace"
