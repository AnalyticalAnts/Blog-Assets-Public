<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070e1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="dimLeft" x1="0" y1="0" x2="430" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="645" cy="240" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="215" cy="200" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#450a0a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#450a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="860" height="430" fill="url(#bg)"/>
  <rect width="860" height="430" fill="url(#redGlow)"/>
  <rect width="860" height="430" fill="url(#blueGlow)"/>
  <rect width="430" height="430" fill="url(#dimLeft)"/>

  <!-- Top accent line -->
  <rect width="860" height="2" fill="#2563eb" opacity="0.7"/>

  <!-- ======================== TITLE ======================== -->
  <text x="430" y="38" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5">
    We Fixed Our Own Front Door
  </text>
  <text x="430" y="61" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="400" fill="#60a5fa" letter-spacing="0.5">
    A B2B Lead-Qualifying Contact Form &#8212; Analytical Ants
  </text>
  <line x1="60" y1="74" x2="800" y2="74" stroke="#1e3a5f" stroke-width="0.75"/>

  <!-- ====================== SECTION LABELS ====================== -->
  <text x="215" y="95" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="9" font-weight="700" fill="#475569" letter-spacing="4.5">BEFORE</text>
  <text x="645" y="95" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="9" font-weight="700" fill="#3b82f6" letter-spacing="4.5">AFTER</text>

  <!-- ====================== DOOR DIVIDER ====================== -->
  <line x1="428" y1="82" x2="428" y2="394" stroke="#1d4ed8" stroke-width="1.2" opacity="0.65"/>
  <line x1="432" y1="82" x2="432" y2="394" stroke="#1d4ed8" stroke-width="1.2" opacity="0.65"/>
  <!-- Door handle -->
  <circle cx="430" cy="250" r="6.5" fill="#0f172a" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="430" cy="250" r="2.5" fill="#3b82f6"/>

  <!-- ====================== LEFT: BEFORE ====================== -->

  <!-- Envelope body -->
  <rect x="112" y="122" width="204" height="136" rx="5"
        fill="#0a1827" stroke="#1e3040" stroke-width="1.5"/>
  <!-- Envelope V-flap -->
  <polyline points="112,122 214,196 316,122"
