<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#0b1830"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="barFaded" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="650" y="80" width="500" height="470" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="rgba(148,163,184,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="3" fill="url(#topBar)"/>

  <!-- Subtle left glow -->
  <ellipse cx="80" cy="315" rx="180" ry="280" fill="rgba(59,130,246,0.04)"/>

  <!-- ─── LEFT CONTENT ─── -->

  <!-- CASE STUDY badge -->
  <rect x="60" y="58" width="116" height="26" rx="13" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
  <text x="118" y="75.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#60a5fa" text-anchor="middle" letter-spacing="1.4">CASE STUDY</text>

  <!-- Main title line 1 -->
  <text x="60" y="168" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="700" fill="#f1f5f9" letter-spacing="-1.5">When the</text>

  <!-- Main title line 2 -->
  <text x="60" y="244" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="700" fill="#f1f5f9" letter-spacing="-1.5">Numbers</text>

  <!-- "Don't Tie" in accent blue -->
  <text x="60" y="320" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="700" fill="#3b82f6" letter-spacing="-1.5">Don't Tie</text>

  <!-- Subtitle -->
  <text x="60" y="364" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15.5" fill="#64748b" letter-spacing="0.2">Rebuilding a BI Platform for a Growing Eyecare Network</text>

  <!-- Divider -->
  <line x1="60" y1="393" x2="580" y2="393" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stats row -->
  <!-- Stat 1: 30+ -->
  <text x="60" y="448" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#3b82f6">30+</text>
  <text x="60" y="468" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#475569" letter-spacing="1.2">PRODUCTION REPORTS</text>

  <!-- Stat 2: $26K -->
  <text x="230" y="448" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#22c55e">$26K</text>
  <text x="230" y="468" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#475569" letter-spacing="1.2">ANNUAL SAVINGS</text>

  <!-- Stat 3: 90% -->
  <text x="398" y="448" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#22c55e">90%</text>
  <text x="398" y="468" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#475569" letter-spacing="1.2">COST REDUCTION</text>

  <!-- Tech tags -->
  <rect x="60" y="496" width="86" height="22" rx="11" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="103" y="511.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#93c5fd" text-anchor="middle">Power BI</text>

  <rect x="156" y="496" width="126" height="22" rx="11" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="219" y="511.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#a5b4fc" text-anchor="middle">Microsoft Fabric</text>

  <rect x="292" y="496" width="68" height="22" rx="11" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="326" y="511.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#93c5fd" text-anchor="middle">Python</text>

  <rect x="370" y="496" width="142" height="22" rx="11" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="441" y="511.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#fbbf24" text-anchor="middle">Healthcare · Eyecare</text>

  <!-- Branding footer -->
  <text x="60" y="587" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#1e3a5f" letter-spacing="0.5">ANALYTICAL ANTS</text>
  <text x="60" y="606" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#1d3353">analyticalants.com</text>

  <!-- ─── RIGHT PANEL: Data Visualization ─── -->

  <!-- Panel background -->
  <rect x="648" y="75" width="504" height="480" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Panel label -->
  <text x="900" y="108" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#334155" text-anchor="middle" letter-spacing="1.5">REPORTING PLATFORM · DELIVERY SNAPSHOT</text>

  <!-- Chart area -->
  <g clip-path="url(#chartClip)">

    <!-- Horizontal grid lines -->
    <line x1="680" y1="460" x2="1120" y2="460" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="680" y1="390" x2="1120" y2="390" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="680" y1="320" x2="1120" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="680" y1="250" x2="1120" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="680" y1="180" x2="1120" y2="180" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text x="675" y="463" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="end">0</text>
    <text x="675" y="393" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="end">10</text>
    <text x="675" y="323" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="end">20</text>
    <text x="675" y="253" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="end">30</text>
    <text x="675" y="183" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="end">40</text>

    <!-- Bars -->
    <!-- Month 1 — foundation, ~7 reports -->
    <rect x="700" y="411" width="52" height="49" rx="4" fill="url(#barFaded)"/>
    <text x="726" y="475" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="middle">Month 1</text>

    <!-- Month 2 — full 30+ delivery (highlighted) -->
    <rect x="778" y="248" width="52" height="212" rx="4" fill="url(#barBlue)" filter="url(#glow)"/>
    <text x="804" y="475" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="600">Month 2</text>
    <text x="804" y="239" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="800" fill="#3b82f6" text-anchor="middle">30+</text>

    <!-- Month 3 — ongoing -->
    <rect x="856" y="240" width="52" height="220" rx="4" fill="url(#barFaded)"/>
    <text x="882" y="475" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="middle">Month 3</text>

    <!-- Month 4 -->
    <rect x="934" y="232" width="52" height="228" rx="4" fill="url(#barFaded)"/>
    <text x="960" y="475" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="middle">Month 4+</text>

    <!-- Month 5 -->
    <rect x="1012" y="228" width="52" height="232" rx="4" fill="url(#barFaded)"/>
    <text x="1038" y="475" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#334155" text-anchor="middle">Month 5+</text>

    <!-- Annotation leader from Month 2 peak -->
    <line x1="804" y1="226" x2="804" y2="160" stroke="rgba(59,130,246,0.3)" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="730" y="136" width="148" height="28" rx="5" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
    <text x="804" y="154" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">30+ reports · 2 months</text>

    <!-- Glow line across chart bottom (accent) -->
    <line x1="680" y1="460" x2="1120" y2="460" stroke="url(#lineGlow)" stroke-width="1.5"/>

  </g>

  <!-- Savings callout card -->
  <rect x="668" y="498" width="462" height="48" rx="8" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="899" y="518" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle">Python automation eliminated premium per-user licenses</text>
  <text x="899" y="536" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">$26,000 / year saved · 90% licensing cost reduction</text>

  <!-- Vertical divider between left and right -->
  <line x1="632" y1="80" x2="632" y2="550" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Bottom accent bar -->
  <rect y="627" width="1200" height="3" fill="url(#topBar)"/>
</svg>
