<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050f07"/>
      <stop offset="100%" stop-color="#0a1a0d"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="50%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="barAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="barFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="35%" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="650" y="80" width="506" height="470" rx="10"/>
    </clipPath>
    <!-- Wood grain texture pattern -->
    <pattern id="grain" x="0" y="0" width="80" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="3" x2="80" y2="3" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle wood-grain lines across full canvas -->
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.7" fill="rgba(134,239,172,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top gradient accent bar -->
  <rect width="1200" height="3" fill="url(#topBar)"/>

  <!-- Left ambient glow -->
  <ellipse cx="100" cy="320" rx="200" ry="260" fill="rgba(21,128,61,0.05)"/>

  <!-- ─── LEFT CONTENT ─── -->

  <!-- CASE STUDY badge -->
  <rect x="60" y="58" width="116" height="26" rx="13" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="118" y="75.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#86efac" text-anchor="middle" letter-spacing="1.4">CASE STUDY</text>

  <!-- Title line 1 -->
  <text x="60" y="164" font-family="Georgia,'Times New Roman',serif" font-size="64" font-weight="700" fill="#f1f5f9" letter-spacing="-1.5">Built for the</text>

  <!-- Title line 2 — accent amber -->
  <text x="60" y="242" font-family="Georgia,'Times New Roman',serif" font-size="64" font-weight="700" fill="#f59e0b" letter-spacing="-1.5">Mill Floor</text>

  <!-- Subtitle -->
  <text x="60" y="288" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" fill="#4d7a57" letter-spacing="0.2">Digitalizing Quality Control Across a Forest Products Operation</text>

  <!-- Divider -->
  <line x1="60" y1="316" x2="590" y2="316" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stats row -->
  <!-- Apps -->
  <text x="60" y="370" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#22c55e">6</text>
  <text x="60" y="390" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#374f3e" letter-spacing="1.1">MODEL-DRIVEN APPS</text>

  <!-- Reports -->
  <text x="175" y="370" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#22c55e">9</text>
  <text x="175" y="390" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#374f3e" letter-spacing="1.1">POWER BI REPORTS</text>

  <!-- Workflows -->
  <text x="290" y="370" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#f59e0b">4</text>
  <text x="290" y="390" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#374f3e" letter-spacing="1.1">QC WORKFLOWS DIGITIZED</text>

  <!-- Entities -->
  <text x="490" y="370" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="800" fill="#f59e0b">30+</text>
  <text x="490" y="390" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#374f3e" letter-spacing="1.1">DATAVERSE ENTITIES</text>

  <!-- Tech tags -->
  <rect x="60" y="418" width="96" height="22" rx="11" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="108" y="433.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#86efac" text-anchor="middle">Power Apps</text>

  <rect x="166" y="418" width="80" height="22" rx="11" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="206" y="433.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#86efac" text-anchor="middle">Power BI</text>

  <rect x="256" y="418" width="84" height="22" rx="11" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="298" y="433.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#86efac" text-anchor="middle">Dataverse</text>

  <rect x="350" y="418" width="130" height="22" rx="11" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="415" y="433.5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#fcd34d" text-anchor="middle">Forest Products</text>

  <!-- Process chain: Grading → Kiln → Planer → Yard -->
  <rect x="60" y="464" width="530" height="46" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="75" y="481" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9.5" fill="#374f3e" letter-spacing="0.8">QC COVERAGE</text>

  <!-- Process boxes -->
  <rect x="75" y="489" width="76" height="14" rx="3" fill="rgba(34,197,94,0.15)"/>
  <text x="113" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Grading</text>

  <text x="161" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1f3d27">→</text>

  <rect x="175" y="489" width="58" height="14" rx="3" fill="rgba(34,197,94,0.15)"/>
  <text x="204" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Kiln</text>

  <text x="243" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1f3d27">→</text>

  <rect x="257" y="489" width="62" height="14" rx="3" fill="rgba(245,158,11,0.12)"/>
  <text x="288" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">Planer</text>

  <text x="329" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1f3d27">→</text>

  <rect x="343" y="489" width="58" height="14" rx="3" fill="rgba(245,158,11,0.12)"/>
  <text x="372" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">Yard</text>

  <text x="411" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" fill="#1f3d27">→ Full Coverage</text>

  <!-- Branding -->
  <text x="60" y="583" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#0f2e15" letter-spacing="0.5">ANALYTICAL ANTS</text>
  <text x="60" y="602" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#0d2412">analyticalants.com</text>

