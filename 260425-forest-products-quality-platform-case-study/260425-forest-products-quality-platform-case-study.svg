  <text x="902" y="108" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1f4a28" text-anchor="middle" letter-spacing="1.5">GRADING ACCURACY · 13-WEEK TREND</text>

  <g clip-path="url(#chartClip)">
    <!-- Grid lines -->
    <line x1="678" y1="460" x2="1130" y2="460" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="678" y1="400" x2="1130" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="678" y1="340" x2="1130" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="678" y1="280" x2="1130" y2="280" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="678" y1="220" x2="1130" y2="220" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="678" y1="160" x2="1130" y2="160" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <!-- Y labels -->
    <text x="674" y="463" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#1f4a28" text-anchor="end">0%</text>
    <text x="674" y="403" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#1f4a28" text-anchor="end">20%</text>
    <text x="674" y="343" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#1f4a28" text-anchor="end">40%</text>
    <text x="674" y="283" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#1f4a28" text-anchor="end">60%</text>
    <text x="674" y="223" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#1f4a28" text-anchor="end">80%</text>
    <text x="674" y="163" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#1f4a28" text-anchor="end">100%</text>

    <!-- 13 week bars — grading accuracy trend, rising over time -->
    <!-- Weeks: W1–W13, accuracy improving from ~62% to ~91% -->
    <rect x="688"  y="383" width="26" height="77"  rx="3" fill="url(#barFade)"/>
    <rect x="720"  y="370" width="26" height="90"  rx="3" fill="url(#barFade)"/>
    <rect x="752"  y="358" width="26" height="102" rx="3" fill="url(#barFade)"/>
    <rect x="784"  y="350" width="26" height="110" rx="3" fill="url(#barFade)"/>
    <rect x="816"  y="336" width="26" height="124" rx="3" fill="url(#barFade)"/>
    <rect x="848"  y="322" width="26" height="138" rx="3" fill="url(#barFade)"/>
    <rect x="880"  y="308" width="26" height="152" rx="3" fill="url(#barFade)"/>
    <rect x="912"  y="294" width="26" height="166" rx="3" fill="url(#barFade)"/>
    <rect x="944"  y="284" width="26" height="176" rx="3" fill="url(#barFade)"/>
    <rect x="976"  y="270" width="26" height="190" rx="3" fill="url(#barFade)"/>
    <rect x="1008" y="258" width="26" height="202" rx="3" fill="url(#barFade)"/>
    <rect x="1040" y="242" width="26" height="218" rx="3" fill="url(#barGreen)"/>
    <rect x="1072" y="226" width="26" height="234" rx="3" fill="url(#barGreen)" filter="url(#glow)"/>

    <!-- X labels — W1 to W13 -->
    <text x="701"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W1</text>
    <text x="733"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W2</text>
    <text x="765"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W3</text>
    <text x="797"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W4</text>
    <text x="829"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W5</text>
    <text x="861"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W6</text>
    <text x="893"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W7</text>
    <text x="925"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W8</text>
    <text x="957"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W9</text>
    <text x="989"  y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W10</text>
    <text x="1021" y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W11</text>
    <text x="1053" y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#1f4a28" text-anchor="middle">W12</text>
    <text x="1085" y="475" font-family="ui-sans-serif,sans-serif" font-size="8" fill="#86efac" text-anchor="middle" font-weight="600">W13</text>

    <!-- Trend line over bars -->
    <polyline
      points="701,383 733,370 765,358 797,350 829,336 861,322 893,308 925,294 957,284 989,270 1021,258 1053,242 1085,226"
      fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>

    <!-- W13 annotation -->
    <line x1="1085" y1="214" x2="1085" y2="140" stroke="rgba(34,197,94,0.35)" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="1008" y="118" width="148" height="26" rx="5" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
    <text x="1082" y="135" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#86efac" text-anchor="middle" font-weight="600">91% accuracy · W13</text>

    <!-- Glow baseline -->
    <line x1="678" y1="460" x2="1130" y2="460" stroke="url(#glowLine)" stroke-width="1.5"/>
