  <!-- SPC callout card -->
  <rect x="668" y="497" width="470" height="48" rx="8" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="903" y="517" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#fcd34d" text-anchor="middle">Automated SPC control bound validation</text>
  <text x="903" y="535" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#f59e0b" text-anchor="middle">Moisture · Std Deviation · Mean — enforced at point of entry</text>

  <!-- Divider -->
  <line x1="632" y1="80" x2="632" y2="550" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Bottom accent bar -->
  <rect y="627" width="1200" height="3" fill="url(#topBar)"/>
</svg>
