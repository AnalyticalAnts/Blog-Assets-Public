<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070e1c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="210" cy="220" r="210" gradientUnits="userSpaceOnUse">
